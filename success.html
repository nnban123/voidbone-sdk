<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .flip { transform: rotate(180deg); }
        .b { border: 1px solid #333; }
    </style>
</head>
<body class="p-4 gap-4">

    <div id="o" class="flex-[1.5] b rounded-2xl p-6 flex flex-col justify-center items-center text-center transition-transform">
        <div id="r" class="text-4xl font-bold tracking-tight"></div>
    </div>

    <div class="flex gap-2 h-16">
        <button onclick="document.getElementById('o').classList.toggle('flip')" class="flex-1 b bg-white/5 rounded-xl text-[10px] font-bold uppercase">Flip</button>
        <button onclick="window.speechSynthesis.speak(new SpeechSynthesisUtterance(document.getElementById('r').innerText))" class="flex-1 b bg-white/5 rounded-xl text-[10px] font-bold uppercase">Speak</button>
        <button onclick="const s=new(window.SpeechRecognition||window.webkitSpeechRecognition)();s.onresult=(e)=>document.getElementById('i').value=e.results[0][0].transcript;s.start()" class="flex-1 b bg-white/5 rounded-xl text-[10px] font-bold uppercase">Listen</button>
    </div>

    <div class="flex-1 bg-white/5 b rounded-2xl p-4 flex flex-col">
        <textarea id="i" class="flex-1 bg-transparent text-xl focus:outline-none resize-none" placeholder="..."></textarea>
        <button onclick="const v=document.getElementById('i').value;if(v){document.getElementById('r').innerText='...';/*Logic*/}" class="w-full py-5 bg-white text-black font-black text-xl rounded-xl mt-2 uppercase">Translate</button>
    </div>

</body>
</html>
