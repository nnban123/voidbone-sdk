<!DOCTYPE html>
<html lang="en" class="notranslate" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>VIP TERMINAL | GLB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; }
        .glow { box-shadow: 0 0 20px rgba(212, 175, 55, 0.2); }
        .terminal-bg { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(212, 175, 55, 0.3); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen px-6">

    <header class="text-center mb-10">
        <div class="inline-block px-4 py-1 border border-[#D4AF37] text-[#D4AF37] text-[10px] font-bold tracking-[0.3em] uppercase mb-4">
            Premium Access Active
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter uppercase">GLB VIP</h1>
    </header>

    <main class="w-full max-w-md terminal-bg rounded-3xl p-8 glow">
        <p class="text-gray-500 text-xs mb-6 font-mono">CONNECTION STATUS: SECURED<br>ENGINE: TOMORI_V1_ACTIVE</p>
        
        <div class="space-y-4 mb-8">
            <div class="text-sm leading-relaxed text-gray-300">
                Welcome to the Unlimited Tier. <br>
                The linguistic barriers are now removed.
            </div>
        </div>

        <input type="text" placeholder="Type anything to translate..." 
               class="w-full bg-white/5 border border-white/10 rounded-xl px-5 py-4 text-white focus:outline-none focus:border-[#D4AF37] mb-4">
        
        <button class="w-full py-4 bg-[#D4AF37] text-black font-black rounded-xl uppercase tracking-widest">
            Execute Global Translation
        </button>
    </main>

    <footer class="mt-10">
        <a href="/index.html" class="text-gray-600 text-[10px] uppercase tracking-widest hover:text-[#D4AF37]">Return to Dashboard</a>
    </footer>

</body>
</html>
