<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GLOBAL LANGUAGE BREAKER</title>
    <style>
        body { 
            background: #000; color: #FFD700; font-family: 'Courier New', monospace; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; overflow: hidden; 
        }
        .title { 
            font-size: 1.2rem; font-weight: bold; letter-spacing: 0.4rem; 
            margin-bottom: 2rem; text-transform: uppercase; text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }
        
        /* THE CIRCLE GLB BUTTON */
        .glb-circle-btn {
            width: 180px; height: 180px;
            border-radius: 50%;
            background: #000;
            border: 4px solid #FFD700;
            color: #FFD700;
            font-size: 2.2rem;
            font-weight: 900;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.2);
            transition: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; align-items: center; justify-content: center;
            margin: 2rem 0;
            outline: none;
        }
        .glb-circle-btn:hover {
            box-shadow: 0 0 40px rgba(255, 215, 0, 0.4);
            background: rgba(255, 215, 0, 0.05);
        }
        .glb-circle-btn:active {
            transform: scale(0.92);
            background: #FFD700;
            color: #000;
            box-shadow: 0 0 10px #FFD700;
        }

        .input-box { 
            width: 85%; max-width: 450px; height: 120px; background: #111; 
            border: 2px solid #FFD700; padding: 1.2rem; color: #FFD700; 
            font-size: 1.4rem; outline: none; border-radius: 15px; resize: none; 
            text-align: center;
        }
        .result-area { 
            width: 85%; max-width: 450px; min-height: 80px; margin-top: 2rem; 
            border-left: 4px solid #FFD700; padding: 1rem; 
            background: rgba(255, 215, 0, 0.05); color: #FFF; font-size: 1.3rem; 
        }
        .status-footer { margin-top: 3rem; font-size: 0.6rem; color: #333; letter-spacing: 0.15rem; }
    </style>
</head>
<body>
    <div class="title">GLOBAL LANGUAGE BREAKER</div>
    
    <textarea class="input-box" id="userInput" placeholder="ENTER TEXT..."></textarea>
    
    <button class="glb-circle-btn" onclick="executeGLB()">GLB</button>
    
    <div class="result-area" id="resultArea">STATUS: READY</div>
    
    <div class="status-footer">SMILE_BASE | FRIEND_BASE | NOIR_AUDIT_ACTIVE</div>

    <script>
        async function executeGLB() {
            const text = document.getElementById('userInput').value.trim();
            const resArea = document.getElementById('resultArea');
            if(!text) return;

            resArea.style.color = "#FFD700";
            resArea.innerText = "BREAKING...";

            try {
                // Smile Friend Server (Stella & Noir Base) 直結
                const response = await fetch('http://127.0.0.1:8080/translate', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text: text, mode: 'strict' })
                });
                
                const data = await response.json();
                resArea.style.color = "#FFF";
                resArea.innerText = data.result || "NO_DATA";
            } catch (e) {
                // Offline Fallback (ノワール監査済みキャッシュの示唆)
                resArea.style.color = "#F00";
                resArea.innerText = " USE STORED DICTIONARY";
            }
        }
    </script>
</body>
</html>
