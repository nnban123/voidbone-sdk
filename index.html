<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GLB | NEXT BASE</title>
  <style>
    /* 画面固定 */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      overflow: hidden; background: #000; font-family: sans-serif;
    }

    /* 扉（動画）を背景いっぱいに配置 */
    .door-video {
      position: absolute;
      top: 50%; left: 50%;
      min-width: 100%; min-height: 100%;
      width: auto; height: auto;
      z-index: 1;
      transform: translate(-50%, -50%);
    }

    /* コンテンツレイヤー：動画の上に浮かせる */
    .content-layer {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: rgba(0, 0, 0, 0.2); /* 扉の奥が見える程度の薄い膜 */
      text-align: center;
    }

    /* ロゴ：扉が開いた先に浮かび上がる演出 */
    .logo-img {
      width: 100px;
      height: auto;
      margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(255, 217, 120, 0.8));
      animation: zoomIn 1.5s ease-out;
    }

    .main-title {
      font-size: 80px;
      font-weight: 900;
      color: #fff;
      margin: 0;
      letter-spacing: 0.15em;
      text-shadow: 0 0 30px rgba(0,0,0,1);
    }

    /* 魂のSTARTボタン：動画に関わらず最初から表示 */
    .btn-start {
      display: block;
      margin-top: 50px;
      background: #ffd978;
      color: #000;
      padding: 22px 90px;
      font-size: 26px;
      font-weight: 900;
      text-decoration: none;
      border-radius: 60px;
      letter-spacing: 0.2em;
      box-shadow: 0 0 40px rgba(255, 217, 120, 0.6);
      transition: 0.3s;
      cursor: pointer;
    }
    .btn-start:hover { transform: scale(1.1); background: #fff; }

    .price-tag { color: #69f0ff; font-weight: bold; margin-top: 20px; letter-spacing: 0.2em; }

    @keyframes zoomIn {
      from { opacity: 0; transform: scale(0.8); }
      to { opacity: 1; transform: scale(1); }
    }

    .footer { position: absolute; bottom: 30px; display: flex; gap: 20px; }
    .footer a { color: rgba(255,255,255,0.4); text-decoration: none; font-size: 11px; }
  </style>
</head>
<body>

  <video autoplay loop muted playsinline class="door-video">
    <source src="door.mp4" type="video/mp4">
  </video>

  <div class="content-layer">
    <img src="icon.png" alt="Logo" class="logo-img">
    <h1 class="main-title">GLB</h1>
    
    <a href="translate.html" class="btn-start">START</a>
    
    <p class="price-tag">$2.99 ACCESS</p>

    <div class="footer">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
      <a href="legal.html">Legal</a>
    </div>
  </div>

</body>
</html>
