<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXTBASE GLB</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overflow: hidden; }
        
        /* Scene 1: Video Gate */
        #video-gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; cursor: pointer; transition: 0.8s; }

        /* Central Layout Engine */
        .stage { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; opacity: 0; transition: 1.5s; }
        
        /* Scene 2: Central Hub */
        .logo-trigger { width: 50vw; max-width: 240px; aspect-ratio: 1/1; background: url('icon.png') no-repeat center; background-size: contain; cursor: pointer; filter: drop-shadow(0 0 30px rgba(255,204,0,0.3)); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .logo-trigger:active { transform: scale(0.92); }
        .ready-text { color: #ffcc00; letter-spacing: 12px; font-size: 1.4rem; margin-top: 30px; font-weight: 900; text-indent: 12px; }
        .sub-text { color: #222; letter-spacing: 6px; font-size: 0.65rem; margin-top: 12px; font-weight: 600; }

        /* Scene 3: Dashboard (Overlay) */
        #dashboard { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 200; padding: 40px 20px; flex-direction: column; align-items: center; justify-content: center; }
        .menu-frame { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; }
        .label { color: #ffcc00; font-size: 0.7rem; letter-spacing: 6px; margin-bottom: 10px; text-align: center; font-weight: 900; }
        
        .m-btn { background: #ffcc00; color: #000; padding: 22px; font-weight: 900; border: none; letter-spacing: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.95rem; transition: 0.2s; }
        .m-btn:active { opacity: 0.7; }
        .m-btn.white { background: #fff; border: 2px solid #ffcc00; }

        /* Language Select */
        #lang-select { background: #000; border: 1px solid #333; color: #fff; padding: 15px; font-size: 0.9rem; letter-spacing: 2px; outline: none; margin-bottom: 10px; border-radius: 0; appearance: none; text-align-last: center; }

        /* Bottom Shields */
        .shields { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; }
        .shields a { color: #444; text-decoration: none; font-size: 0.65rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; transition: 0.3s; }
        .shields a:hover { color: #ffcc00; }
        
        .close-hub { margin-top: 40px; color: #ffcc00; cursor: pointer; letter-spacing: 6px; font-size: 0.75rem; font-weight: 900; }
        .sig { position: absolute; bottom: 40px; color: #080808; letter-spacing: 12px; font-size: 0.6rem; font-weight: 900; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="enter()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div class="stage" id="hub">
        <div class="logo-trigger" onclick="openDash()"></div>
        <div class="ready-text">READY</div>
        <div class="sub-text">GLOBAL LANGUAGE BREAKER</div>
        <div class="sig">SMILE / FRIEND</div>
    </div>

    <div id="dashboard">
        <div class="menu-frame">
            <div class="label">DASHBOARD</div>
            
            <select id="lang-select">
                <option value="auto">LANGUAGE: AUTO DETECT</option>
                <option value="en-th">ENGLISH / THAI</option>
                <option value="en-vi">ENGLISH / VIETNAMESE</option>
                <option value="en-id">ENGLISH / INDONESIAN</option>
                <option value="en-hi">ENGLISH / HINDI</option>
                <option value="jp-en">JAPANESE / ENGLISH</option>
            </select>

            <button class="m-btn" onclick="location.href='https://nextbase-one-ha.github.io/noir/'">OPEN BREAKER</button>
            <button class="m-btn white" onclick="alert('Access: $2.99')">ACTIVATE ($2.99)</button>
            
            <div class="shields">
                <a href="legal.html">Legal</a>
                <a href="terms.html">Terms</a>
                <a href="privacy.html">Privacy</a>
                <a href="support.html">Support</a>
            </div>
            
            <div class="close-hub" onclick="closeDash()">[ CLOSE ]</div>
        <で/div>
    </div>

    <script>
        const v = document.getElementById('video-gate');
        const h = document.getElementById('hub');
        const d = document.getElementById('dashboard');

        function enter() {
            v.style.opacity = '0';
            setTimeout(() => {
                v.style.display = 'none';
                h.style.display = 'flex';
                setTimeout(() => { h.style.opacity = '1'; }, 100);
            }, 800);
        }

        v.onended = enter;
        function openDash() { d.style.display = 'flex'; }
        function closeDash() { d.style.display = 'none'; }
    </script>
</body>
</html>
