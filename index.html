<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GLB | NEXT BASE</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* トップ専用のエクストリーム・デザイン */
    body { background: #000; overflow-x: hidden; }
    
    .hero-content {
      text-align: center;
      padding: 60px 20px;
      animation: fadeIn 1.2s ease-out;
    }

    .logo-container {
      margin-bottom: 30px;
    }

    .logo-img {
      width: 100px;
      height: auto;
      filter: drop-shadow(var(--shadow-gold));
    }

    .video-frame {
      width: 100%;
      max-width: 900px;
      margin: 40px auto;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      box-shadow: var(--shadow-neon);
      overflow: hidden;
      background: #000;
    }

    video { width: 100%; display: block; }

    .main-title {
      font-size: clamp(60px, 10vw, 120px);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin: 0;
      background: linear-gradient(135deg, #fff 30%, var(--gold) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .slogan {
      font-size: clamp(18px, 3vw, 28px);
      color: var(--muted);
      margin: 20px 0 40px;
      letter-spacing: 0.1em;
    }

    /* 魂のGOボタン */
    .btn-launch {
      display: inline-block;
      background: var(--gold-2);
      color: #000;
      padding: 24px 80px;
      font-size: 24px;
      font-weight: 900;
      text-decoration: none;
      border-radius: 60px;
      letter-spacing: 0.2em;
      box-shadow: var(--shadow-gold);
      transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
      position: relative;
      overflow: hidden;
    }

    .btn-launch:hover {
      transform: scale(1.1) translateY(-5px);
      background: #fff;
      box-shadow: 0 20px 40px rgba(255, 217, 120, 0.4);
    }

    .price-notice {
      margin-top: 20px;
      color: var(--neon);
      font-weight: bold;
      letter-spacing: 0.3em;
      font-size: 14px;
      text-transform: uppercase;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .footer-links {
      margin-top: 100px;
      padding: 40px;
      border-top: 1px solid var(--line);
      display: flex;
      justify-content: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .footer-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 12px;
      transition: 0.3s;
    }

    .footer-links a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero-content">
      <div class="logo-container">
        <img src="logo.png" alt="GLB" class="logo-img">
      </div>
      
      <h1 class="main-title">GLB</h1>
      <p class="slogan">Meaning, Delivered.</p>

      <div class="video-frame">
        <video src="video.mp4" autoplay loop muted playsinline></video>
      </div>

      <p class="lead" style="max-width: 600px; margin: 0 auto 40px; line-height: 1.8;">
        English fluency is no longer a requirement.<br>
        Built for users who need to be understood, not just translated.
      </p>

      <a href="translate.html" class="btn-launch">START</a>
      <p class="price-notice">$2.99 / One-time Access</p>
    </div>

    <footer class="footer-links">
      <a href="support.html">Support</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
      <a href="legal.html">Legal Notice</a>
      <p style="width: 100%; text-align: center; opacity: 0.3; margin-top: 20px;">© NEXT BASE</p>
    </footer>
  </div>
</body>
</html>
