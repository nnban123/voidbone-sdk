<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLB - Global Language Breaker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* SCENE 1: THE GATE (上下に「無」を強制確保) */
        #video-gate { 
            position: absolute; 
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-height: 70vh; /* 上下に15%ずつの「無」を確保 */
            object-fit: contain; 
            z-index: 100; 
            cursor: pointer; 
            transition: 0.8s ease-in-out; 
        }

        /* SCENE 2: THE HUB */
        #hub { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; z-index: 10; opacity: 0; transition: 1.5s; 
        }
        
        /* ロゴを品格あるサイズへ縮小 */
        .glb-logo-btn { 
            width: 35vw; /* 50vwから35vwへ縮小 */
            max-width: 160px; 
            aspect-ratio: 1/1; 
            background: url('icon.png') no-repeat center; 
            background-size: contain; 
            cursor: pointer; 
            filter: drop-shadow(0 0 30px rgba(255,204,0,0.3)); 
            transition: 0.3s; 
        }
        .glb-logo-btn:active { transform: scale(0.92); }
        
        .ready-text { color: #ffcc00; letter-spacing: 12px; font-size: 1rem; margin-top: 25px; font-weight: 900; text-indent: 12px; }
        .sub-text { color: #111; letter-spacing: 5px; font-size: 0.5rem; margin-top: 8px; font-weight: 900; }

        /* DASHBOARD */
        #dashboard { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.98); z-index: 200; 
            padding: 40px 20px; flex-direction: column; align-items: center; justify-content: center; 
        }
        .menu-frame { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 10px; text-align: center; }
        .label { color: #ffcc00; font-size: 0.7rem; letter-spacing: 8px; margin-bottom: 20px; font-weight: 900; }
        .m-btn { background: #ffcc00; color: #000; padding: 20px; font-weight: 900; border: none; letter-spacing: 4px; cursor: pointer; font-size: 0.85rem; }
        .m-btn.white { background: #fff; border: 2px solid #ffcc00; }
        
        .decoration-text { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; color: #222; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 600; cursor: default; }
        .close-hub { margin-top: 40px; color: #ffcc00; cursor: pointer; letter-spacing: 6px; font-size: 0.8rem; font-weight: 900; }
        .sig { position: absolute; bottom: 40px; color: #080808; letter-spacing: 10px; font-size: 0.5rem; font-weight: 900; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="enter()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="hub">
        <div class="glb-logo-btn" onclick="openDash()"></div>
        <div class="ready-text">READY</div>
        <div class="sub-text">GLOBAL LANGUAGE BREAKER</div>
        <div class="sig">SMILE / FRIEND</div>
    </div>

    <div id="dashboard">
        <div class="menu-frame">
            <div class="label">DASHBOARD</div>
            <button class="m-btn" onclick="launchBreaker()">OPEN BREAKER</button>
            <button class="m-btn white" onclick="window.open('https://buy.stripe.com/bJedRbefH5yogzZfuDasg09', '_blank')">ACTIVATE ($2.99/mo)</button>
            
            <div class="decoration-text">
                <span>SUPPORT</span><span>PRIVACY</span><span>TERMS</span><span>LEGAL</span>
            </div>
            
            <div class="close-hub" onclick="closeDash()">[ CLOSE ]</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('video-gate');
        const h = document.getElementById('hub');
        const d = document.getElementById('dashboard');

        function enter() {
            v.style.opacity = '0';
            setTimeout(() => {
                v.style.display = 'none';
                h.style.display = 'flex';
                setTimeout(() => { h.style.opacity = '1'; }, 100);
            }, 800);
        }

        v.onended = enter;
        function openDash() { d.style.display = 'flex'; }
        function closeDash() { d.style.display = 'none'; }
        function launchBreaker() { window.location.href = './noir/index.html'; }
    </script>
</body>
</html>
