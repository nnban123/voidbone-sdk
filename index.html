<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLB - Global Language Breaker</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        
        /* SCENE 1: THE GATE */
        #video-gate { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; max-height: 75vh; object-fit: contain; z-index: 100; 
            cursor: pointer; transition: 0.8s ease-in-out; 
        }

        /* SCENE 2: THE HUB */
        #hub { 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
            width: 100%; height: 100%; z-index: 10; opacity: 0; transition: 1.5s; 
        }
        .glb-logo-btn { 
            width: 160px; height: 160px;
            background: url('icon.png') no-repeat center; background-size: contain; 
            cursor: pointer; filter: drop-shadow(0 0 30px rgba(212,175,55,0.4)); transition: 0.3s; 
        }
        .glb-logo-btn:active { transform: scale(0.92); }
        .ready-text { color: #D4AF37; letter-spacing: 12px; font-size: 1rem; margin-top: 25px; font-weight: 900; }

        /* SCENE 3: ONBOARDING DASHBOARD */
        #dashboard { 
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); 
            z-index: 200; padding: 40px 20px; flex-direction: column; align-items: center; justify-content: center; 
        }
        .menu-frame { width: 100%; max-width: 340px; display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .label { color: #D4AF37; font-size: 0.8rem; letter-spacing: 8px; margin-bottom: 10px; font-weight: 900; }
        
        /* オンボーディング説明文 */
        .onboarding-text { color: #888; font-size: 0.85rem; line-height: 1.6; margin-bottom: 20px; text-align: center; letter-spacing: 1px; }
        .onboarding-text b { color: #D4AF37; }

        .m-btn { background: #D4AF37; color: #000; padding: 20px; font-weight: 900; border: none; letter-spacing: 2px; cursor: pointer; font-size: 0.9rem; border-radius: 15px; transition: 0.3s; }
        .m-btn.white { background: #fff; }
        .m-btn.black { background: #222; color: #D4AF37; border: 1px solid #D4AF37; }
        
        .decoration-text { display: flex; justify-content: center; gap: 20px; margin-top: 30px; color: #444; font-size: 0.65rem; letter-spacing: 3px; }
        .close-hub { margin-top: 40px; color: #D4AF37; cursor: pointer; letter-spacing: 6px; font-size: 0.8rem; font-weight: 900; opacity: 0.6; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="enter()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="hub">
        <div class="glb-logo-btn" onclick="openDash()"></div>
        <div class="ready-text">READY</div>
        <div style="color: #111; letter-spacing: 5px; font-size: 0.5rem; margin-top: 8px; font-weight: 900;">GLOBAL LANGUAGE BREAKER</div>
    </div>

    <div id="dashboard">
        <div class="menu-frame">
            <div class="label">MISSION BRIEFING</div>
            
            <div class="onboarding-text">
                <b>[THE SHIELD]</b><br>Monthly safety & manner briefing.<br>
                <b>[THE WEAPON]</b><br>150k phrases with tilt-enlarge UI.
            </div>

            <button class="m-btn white" onclick="window.open('https://buy.stripe.com/7sY28t7Rje4UgzZ1DNasg0q', '_blank')">TRAVEL MODE ($24.99)</button>
            <button class="m-btn" onclick="window.open('https://buy.stripe.com/bJedRbefH5yogzZfuDasg09', '_blank')">ACTIVATE ($2.99/mo)</button>
            <button class="m-btn black" onclick="launchBreaker()">TRY BREAKER (FREE)</button>
            
            <div class="decoration-text">
                <span>SUPPORT</span><span>PRIVACY</span><span>TERMS</span>
            </div>
            
            <div class="close-hub" onclick="closeDash()">[ CLOSE ]</div>
        </div>
    </div>

    <script>
        const v = document.getElementById('video-gate');
        const h = document.getElementById('hub');
        const d = document.getElementById('dashboard');

        function enter() {
            v.style.opacity = '0';
            setTimeout(() => {
                v.style.display = 'none';
                h.style.display = 'flex';
                setTimeout(() => { h.style.opacity = '1'; }, 100);
            }, 800);
        }
        v.onended = enter;
        function openDash() { d.style.display = 'flex'; }
        function closeDash() { d.style.display = 'none'; }
        function launchBreaker() { window.location.href = './noir/index.html'; }
    </script>
</body>
</html>
