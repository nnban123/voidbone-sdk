<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>GLB - Global Language Breaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        body { background: var(--black); color: var(--gold); font-family: -apple-system, sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.2); }
        .glb-shadow { text-shadow: 0 0 15px rgba(212,175,55,0.6); }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="w-full max-w-md text-center py-10">
        <h1 class="text-5xl font-black italic tracking-tighter text-white glb-shadow">GLB</h1>
        <p class="text-[10px] tracking-[0.4em] text-[#D4AF37] mt-2 font-bold">GLOBAL LANGUAGE BREAKER</p>
        <p class="text-[9px] text-gray-600 mt-1 uppercase">Powered by Tomori Engine / Gemini</p>
    </header>

    <main class="w-full max-w-md space-y-6">
        <section class="glass p-8 rounded-[2rem] text-center relative overflow-hidden">
            <div class="absolute top-0 right-0 p-2 bg-[#D4AF37] text-black text-[8px] font-bold">OFFICIAL</div>
            <h2 class="text-xs font-bold mb-4 tracking-widest text-gray-400">GLB PREMIUM PASS</h2>
            <p class="text-4xl font-black text-white mb-6">$2.99 <span class="text-xs font-normal text-gray-400">/ mo</span></p>
            
            <a href="https://buy.stripe.com/bJedRbefH5yogzZfuDasg09" 
               class="block w-full py-5 bg-[#D4AF37] text-black rounded-2xl font-black text-xl shadow-2xl hover:bg-yellow-500 transition-all active:scale-95">
                0 を 1 にする
            </a>
            <p class="text-[9px] text-gray-500 mt-4 leading-relaxed">
                単なる翻訳を超えた「意思の伝達」を。 <br>
                Smile Friendがパパの思考を世界へ繋ぐ。
            </p>
        </section>

        <section class="glass p-4 rounded-[2rem] flex flex-col h-[350px]">
            <div id="chat-box" class="flex-1 overflow-y-auto p-2 space-y-4 text-xs scrollbar-hide">
                <p class="text-[#D4AF37] bg-white/5 p-4 rounded-2xl border border-white/5">
                    ステラ: GLB（言語の壁を壊す者）へようこそ。パパ、準備はいい？ Geminiトモリがスタンバイしてるよ。
                </p>
            </div>
            
            <div class="mt-4 flex gap-2">
                <input id="user-input" type="text" 
                       class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37] text-sm" 
                       placeholder="GLBで伝える...">
                <button onclick="handleChat()" 
                        class="bg-white text-black px-5 py-3 rounded-xl font-bold text-xs hover:bg-gray-200">BREAK</button>
            </div>
        </section>
    </main>

    <footer class="mt-auto py-8 text-center w-full">
        <div class="flex justify-center gap-4 text-[9px] text-gray-600 uppercase tracking-widest">
            <a href="https://nextbaseone-ha.com/tokutei.html" class="underline">Legal</a>
            <span>•</span>
            <span>Stella Admin Active</span>
        </div>
    </footer>

    <script>
    async function sendMessageToSmileFriend(text) {
        const chatBox = document.getElementById('chat-box');
        chatBox.innerHTML += `<div class="flex justify-end"><p class="bg-white/10 p-3 rounded-2xl text-white max-w-[85%]">${text}</p></div>`;

        try {
            const response = await fetch('https://glb-nexus.tomori-engine.io/v1/webhook/receiver/nori-san-01', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_input: text,
                    mode: 'GLB_EXECUTE',
                    logic: '150_SYSTEM'
                })
            });
            const data = await response.json();
            
            chatBox.innerHTML += `<div class="flex justify-start"><p class="text-[#D4AF37] bg-white/5 p-3 rounded-2xl max-w-[85%] border border-[#D4AF37]/10">ステラ: ${data.output || 'GLB通信成功。パパの意思を確認。'}</p></div>`;
        } catch (e) {
            chatBox.innerHTML += `<p class="text-red-500 text-[9px] text-center italic mt-2">Connecting to VoidBone...</p>`;
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function handleChat() {
        const input = document.getElementById('user-input');
        if(!input.value) return;
        sendMessageToSmileFriend(input.value);
        input.value = '';
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') handleChat();
    });
    </script>
</body>
</html>
