<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>GLB | NEXT BASE</title>
  <style>
    /* ステラによる鋼の規律：一切の無駄を排除 */
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: #050505; color: #f3f3f3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      overflow: hidden;
    }

    .container {
      text-align: center; width: 90%; max-width: 420px;
    }

    /* アイコン（icon.png）を神聖なシンボルとして中央に */
    .icon-img {
      width: 120px; height: auto; margin-bottom: 20px;
      filter: drop-shadow(0 0 20px rgba(224, 184, 93, 0.5));
    }

    .brand-name {
      font-size: 72px; font-weight: 900; margin: 0;
      letter-spacing: 0.15em; color: #ffd978; /* NORI-san standards: Gold */
    }

    .slogan {
      font-size: 18px; color: #888; margin: 15px 0 60px;
      letter-spacing: 0.1em; font-weight: 300;
    }

    /* 魂のSTARTボタン：翻訳画面（translate.html）への最短ルート */
    .btn-action {
      display: block;
      background: #ffd978; color: #000;
      padding: 24px 0; font-size: 28px; font-weight: 900;
      text-decoration: none; border-radius: 15px;
      box-shadow: 0 10px 40px rgba(224, 184, 93, 0.4);
      transition: 0.3s cubic-bezier(0.19, 1, 0.22, 1);
      letter-spacing: 0.2em;
    }

    .btn-action:hover {
      background: #fff; transform: translateY(-5px);
      box-shadow: 0 15px 50px rgba(255, 255, 255, 0.3);
    }

    .price-notice {
      margin-top: 25px; color: #69f0ff; /* Neon blue */
      font-weight: bold; font-size: 15px; letter-spacing: 0.2em;
    }

    /* フッター：法務導線 */
    .footer-nav {
      position: absolute; bottom: 40px; display: flex; gap: 24px;
    }

    .footer-nav a {
      color: rgba(255, 255, 255, 0.3); text-decoration: none; font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="container">
    <img src="icon.png" alt="GLB" class="icon-img">
    
    <h1 class="brand-name">GLB</h1>
    <p class="slogan">MEANING, DELIVERED.</p>

    <a href="translate.html" class="btn-action">START</a>
    
    <p class="price-notice">$2.99 / ONE-TIME ACCESS</p>
  </div>

  <nav class="footer-nav">
    <a href="support.html">Support</a>
    <a href="privacy.html">Privacy</a>
    <a href="terms.html">Terms</a>
    <a href="legal.html">Legal</a>
  </nav>

</body>
</html>
