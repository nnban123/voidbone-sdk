<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GLB</title>
    <style>
        body { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: -apple-system, sans-serif; color: #D4AF37; }
        
        /* 🚨 自動再生ビデオ 🚨 */
        #gate-video { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 500; }
        
        #main-ui { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; opacity: 0; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: space-around; padding: 40px 0; box-sizing: border-box; }
        #main-ui.active { opacity: 1; pointer-events: auto; z-index: 600; background: #000; }

        .breaker-btn { width: 120px; height: 120px; background: url('icon_s.png') no-repeat center center; background-size: contain; cursor: pointer; }
        .lang-select { background: #000; border: 1px solid #D4AF37; color: #D4AF37; padding: 10px; border-radius: 4px; font-size: 16px; }
        #info-text { width: 85%; max-width: 340px; font-size: 13px; color: #fff; line-height: 1.6; text-align: left; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px; }
    </style>
</head>

<body onclick="terminateGate()">

    <video id="gate-video" autoplay muted playsinline loop>
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="main-ui">
        <div id="info-text">
            <b>[NB_001_PROTO: SMILE FRIEND]</b><br>
            2026/4/1適用の Google API 制限を無効化する 15万語の核知能。2.99ドルの実弾で、高精度翻訳を解放します。
        </div>

        <div style="display:flex; gap:10px;">
            <select class="lang-select"><option>日本語</option><option>English</option></select>
            <select class="lang-select"><option>English</option><option>日本語</option></select>
        </div>

        <div class="breaker-btn" onclick="goToStripe(event)"></div>
        
        <div style="font-size:10px; opacity:0.3; letter-spacing:4px;">VOIDBONE // GLB</div>
    </div>

    <script>
        const video = document.getElementById('gate-video');
        const mainUI = document.getElementById('main-ui');

        // 動画終了（loopを外した場合）またはクリックでUIへ
        function terminateGate() {
            video.style.display = 'none';
            mainUI.classList.add('active');
            if (navigator.vibrate) navigator.vibrate(50);
        }

        function goToStripe(e) {
            e.stopPropagation(); // terminateGateの着火を防ぐ
            window.location.href = "https://buy.stripe.com/bJedRbefH5yogzZfuDasg09";
        }

        // 自動再生がブラウザに阻止された場合の保険：1秒後に強制チェック
        setTimeout(() => {
            if (video.paused) {
                console.log("Autoplay blocked. Waiting for click.");
            }
        }, 1000);
    </script>
</body>
</html>
