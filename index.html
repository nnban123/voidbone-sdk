<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GLB - Global Language Breaker</title>
    <style>
        :root { --gold: #D4AF37; --black: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--black); color: var(--gold); font-family: -apple-system, sans-serif; overflow-x: hidden; }

        /* Scene 1: THE GATE (動画) */
        #video-gate { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 100; cursor: pointer; transition: 0.8s ease-out; }

        /* Scene 2: THE HUB (ロゴ画面) */
        #hub { height: 100vh; display: none; flex-direction: column; align-items: center; justify-content: center; opacity: 0; transition: 1s; }
        .logo-btn { width: 180px; height: 180px; background: url('icon.png') no-repeat center; background-size: contain; cursor: pointer; filter: drop-shadow(0 0 20px rgba(212,175,55,0.4)); transition: 0.3s; }
        .logo-btn:active { transform: scale(0.9); }
        .ready-text { color: var(--gold); letter-spacing: 12px; font-size: 1.2rem; margin-top: 30px; font-weight: 900; }

        /* Scene 3: ONBOARDING (画像11:18の再現) */
        #onboarding { padding: 80px 25px; text-align: center; max-width: 600px; margin: 0 auto; display: none; }
        .next-level { color: var(--gold); letter-spacing: 8px; font-size: 1.5rem; margin-bottom: 50px; font-weight: 900; }
        .card { border: 1px solid rgba(212,175,55,0.3); border-radius: 40px; padding: 40px 25px; margin-bottom: 25px; background: rgba(10,10,10,0.8); }
        .card h3 { color: #FFF; font-size: 1.5rem; letter-spacing: 2px; margin: 0 0 15px; }
        .card p { color: #888; font-size: 1rem; line-height: 1.6; margin: 0; }

        /* Buttons */
        .btn-gold { background: var(--gold); color: #000; border: none; width: 100%; max-width: 350px; padding: 22px; font-weight: 900; border-radius: 25px; font-size: 1.1rem; cursor: pointer; margin-top: 40px; box-shadow: 0 10px 30px rgba(212,175,55,0.3); }
        .btn-outline { background: transparent; color: var(--gold); border: 1px solid var(--gold); width: 100%; max-width: 350px; padding: 18px; border-radius: 25px; margin-top: 15px; cursor: pointer; font-weight: 700; }
        .try-free { color: #444; text-decoration: underline; font-size: 0.9rem; margin-top: 25px; display: block; border: none; background: none; width: 100%; }
    </style>
</head>
<body>

    <video id="video-gate" autoplay muted playsinline onclick="enter()">
        <source src="door.mp4" type="video/mp4">
    </video>

    <div id="hub">
        <div class="logo-btn" onclick="showOnboarding()"></div>
        <div class="ready-text">READY</div>
    </div>

    <div id="onboarding">
        <div class="next-level">NEXT LEVEL</div>
        
        <div class="card">
            <h3>NO MORE FEAR</h3>
            <p>We provide real-time local manners and tipping guides. Walk any street with a confident smile.</p>
        </div>

        <div class="card">
            <h3>INSTANT CONNECT</h3>
            <p>150,000 specialized phrases at your fingertips. Tilt your iPhone to speak through the screen.</p>
        </div>

        <button class="btn-gold" onclick="window.open('https://buy.stripe.com/7sY28t7Rje4UgzZ1DNasg0q', '_blank')">ACTIVATE TRAVEL MODE ($24.99)</button>
        <button class="btn-outline" onclick="window.open('https://buy.stripe.com/bJedRbefH5yogzZfuDasg09', '_blank')">GET BASIC PASS ($2.99)</button>
        <button class="try-free" onclick="location.href='./noir/index.html'">Try for free</button>
    </div>

    <script>
        const v = document.getElementById('video-gate');
        const h = document.getElementById('hub');
        const o = document.getElementById('onboarding');

        function enter() {
            v.style.opacity = '0';
            setTimeout(() => {
                v.style.display = 'none';
                h.style.display = 'flex';
                setTimeout(() => { h.style.opacity = '1'; }, 100);
            }, 800);
        }
        v.onended = enter;

        function showOnboarding() {
            h.style.display = 'none';
            o.style.display = 'block';
            window.scrollTo(0, 0);
        }
    </script>
</body>
</html>
